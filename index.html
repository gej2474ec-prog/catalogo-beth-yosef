<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Catálogo</title>
  <!-- App instalable (PWA) -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e1251b">
  <link rel="apple-touch-icon" href="icon-ios-v3.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BETH YOSEF">
  <style>
    :root{
      --acento:#e1251b;
      --acento-osc:#b91c1c;
      --fondo:#f4f5f7;
      --tarjeta:#ffffff;
      --texto:#1f2937;
      --suave:#6b7280;
      --borde:#e5e7eb;
      --verde:#22c55e;
      --verde-osc:#16a34a;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:var(--fondo);
      color:var(--texto);
      line-height:1.5;
      touch-action:manipulation;
      -webkit-text-size-adjust:100%;
    }
    header{
      position:fixed;top:0;left:0;right:0;z-index:30;
      background:#fff;
      color:var(--texto);
      padding:22px 20px 16px;
      border-bottom:3px solid var(--acento);
      display:flex;align-items:center;justify-content:center;gap:12px;
      transition:padding .2s ease;
    }
    header .logo{
      max-width:300px;width:70%;height:auto;aspect-ratio:1088/323;display:block;margin:0;cursor:pointer;
      transition:max-width .2s ease, width .2s ease, height .2s ease;
    }
    /* Al hacer scroll: logo chico pero CENTRADO */
    header.compacto{padding:8px 16px}
    header.compacto .logo{max-width:170px;width:auto;height:40px}
    /* Espaciador: reserva el lugar del encabezado fijo (evita el brinco) */
    #spacer{width:100%}

    .barra{
      position:sticky;top:59px;z-index:10;
      background:var(--tarjeta);
      border-bottom:1px solid var(--borde);
      padding:12px 16px;
      display:flex;gap:10px;flex-wrap:wrap;
      align-items:center;justify-content:center;
    }
    #buscar{
      flex:1;min-width:200px;max-width:420px;
      padding:11px 16px;
      border:1px solid var(--borde);border-radius:999px;
      font-size:1rem;outline:none;
    }
    #buscar:focus{border-color:var(--acento)}
    .filtros{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
    .hint-fam{display:none}
    @keyframes desliza{0%,100%{transform:translateX(-3px)}50%{transform:translateX(3px)}}
    .chip{
      padding:8px 16px;border-radius:999px;
      border:1px solid var(--borde);background:#fff;
      cursor:pointer;font-size:.9rem;color:var(--suave);
      transition:all .15s;
    }
    .chip:hover{border-color:var(--acento)}
    .chip.activo{background:var(--acento);color:#fff;border-color:var(--acento)}

    .clientebar{
      background:#fff;border-bottom:1px solid var(--borde);
      padding:10px 16px;display:flex;gap:10px;align-items:center;
      justify-content:center;flex-wrap:wrap;font-size:.92rem;
    }
    .clientebar label{color:var(--suave)}
    .clientebar input{
      width:140px;padding:8px 12px;border:1px solid var(--borde);
      border-radius:8px;font-size:.95rem;outline:none;
    }
    .clientebar input:focus{border-color:var(--acento)}
    #clienteMsg{font-weight:700}
    #clienteMsg.ok{color:var(--verde-osc)}
    #clienteMsg.no{color:#b45309}

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
      gap:20px;
      padding:24px;
      max-width:1200px;margin:0 auto;
    }
    .card{
      background:var(--tarjeta);
      border:1px solid var(--borde);
      border-radius:16px;
      overflow:hidden;
      display:flex;flex-direction:column;
      transition:transform .15s, box-shadow .15s;
    }
    .card:hover{transform:translateY(-4px);box-shadow:0 12px 24px rgba(0,0,0,.08)}
    .foto{
      width:100%;aspect-ratio:1/1;
      background:#fff;
      object-fit:contain;
      padding:10px;
      display:block;
    }
    .sin-foto{
      display:flex;align-items:center;justify-content:center;
      color:#c0c4cc;font-size:3rem;
    }
    .info{padding:14px 16px;display:flex;flex-direction:column;flex:1}
    .cat{font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:var(--acento);font-weight:700}
    .nombre{font-weight:700;margin:4px 0;font-size:1.02rem;flex:1}
    .codigo{font-size:.78rem;color:var(--suave);margin-top:2px}
    .codigo b{color:var(--texto);font-weight:600}
    .existencia{font-size:.8rem;color:var(--suave);margin-top:4px}
    .existencia b{color:#16a34a;font-weight:700}
    .precio{font-size:1.35rem;font-weight:800;margin-top:10px}
    .precio .u{font-size:.8rem;color:var(--suave);font-weight:600}
    .precio .base{font-size:.85rem;color:var(--suave);text-decoration:line-through;font-weight:600;margin-left:6px}
    .badge-cli{display:inline-block;background:var(--acento);color:#fff;font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:999px;margin-left:6px;vertical-align:middle;letter-spacing:.3px}
    .card.agotado .foto{opacity:.45;filter:grayscale(.4)}
    .agotado-msg{
      margin-top:12px;text-align:center;color:var(--suave);font-weight:700;
      padding:11px;border:1px dashed var(--borde);border-radius:10px;background:#f9fafb;
    }
    .cinta-agotado{
      position:absolute;top:10px;left:10px;z-index:2;
      background:#6b7280;color:#fff;font-size:.66rem;font-weight:800;
      padding:4px 10px;border-radius:6px;letter-spacing:.5px;
    }
    .card{position:relative}

    .qty{display:flex;align-items:center;margin-top:10px}
    .qty button{
      width:40px;height:42px;flex:none;
      border:1px solid var(--borde);background:#f9fafb;
      font-size:1.3rem;line-height:1;cursor:pointer;color:var(--texto);
      user-select:none;
    }
    .qty button:hover{background:#eef0f3}
    .qty button.menos{border-radius:10px 0 0 10px}
    .qty button.mas{border-radius:0 10px 10px 0}
    .qty input{
      flex:1;width:100%;min-width:0;height:42px;text-align:center;
      border:1px solid var(--borde);border-left:none;border-right:none;
      font-size:1.05rem;font-weight:600;outline:none;
      -moz-appearance:textfield;
    }
    .qty input::-webkit-outer-spin-button,
    .qty input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    .qty .u{margin-left:8px;color:var(--suave);font-weight:600;font-size:.95rem;white-space:nowrap}

    .btn-add{
      margin-top:12px;
      display:flex;align-items:center;justify-content:center;gap:8px;
      background:var(--acento);color:#fff;border:none;
      padding:11px;border-radius:10px;font-weight:600;font-size:.95rem;
      cursor:pointer;transition:background .15s;
    }
    .btn-add:hover{background:var(--acento-osc)}
    .btn-add.ok{background:var(--verde)}
    button svg{pointer-events:none;vertical-align:middle}

    .vacio{text-align:center;color:var(--suave);padding:60px 20px;grid-column:1/-1}
    footer{text-align:center;padding:30px 20px 100px;color:var(--suave);font-size:.85rem;font-weight:700}
    #pie .powered{font-size:.72rem;font-weight:400;opacity:.6;margin-top:4px}

    /* ---------- Botón flotante del carrito ---------- */
    #verPedido{
      position:fixed;left:50%;transform:translateX(-50%);
      bottom:20px;z-index:40;
      display:none;align-items:center;gap:10px;
      background:#fff;color:var(--acento);border:2px solid var(--acento);
      padding:13px 24px;border-radius:999px;
      font-size:1rem;font-weight:700;cursor:pointer;
      box-shadow:0 8px 24px rgba(0,0,0,.22);
    }
    #verPedido:hover{background:#fff5f5}
    #verPedido .globo{
      background:var(--acento);color:#fff;
      border-radius:999px;padding:1px 9px;font-size:.85rem;font-weight:800;
    }

    /* ---------- Panel del carrito ---------- */
    #fondoCarrito{
      position:fixed;inset:0;background:rgba(0,0,0,.45);
      z-index:50;display:none;
    }
    #carrito{
      position:fixed;top:0;right:0;height:100%;
      width:100%;max-width:420px;
      background:var(--tarjeta);z-index:60;
      display:none;flex-direction:column;
      box-shadow:-8px 0 30px rgba(0,0,0,.2);
    }
    #carrito .cab{
      padding:18px 20px;border-bottom:1px solid var(--borde);
      display:flex;align-items:center;justify-content:space-between;
    }
    #carrito .cab h2{font-size:1.2rem}
    #cerrar{background:none;border:none;font-size:1.6rem;cursor:pointer;color:var(--suave);line-height:1}
    #items{flex:1;overflow-y:auto;padding:10px 16px}
    .item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--borde)}
    .item img{width:60px;height:60px;border-radius:10px;object-fit:contain;background:#fff;border:1px solid var(--borde);flex:none}
    .item .sf{width:60px;height:60px;border-radius:10px;background:#eef0f3;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex:none}
    .item .d{flex:1;min-width:0}
    .item .dn{font-weight:600;font-size:.92rem}
    .item .dc{font-size:.75rem;color:var(--suave)}
    .item .df{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
    .miniqty{display:flex;align-items:center}
    .miniqty button{width:30px;height:30px;border:1px solid var(--borde);background:#f9fafb;cursor:pointer;font-size:1.1rem;line-height:1}
    .miniqty button:first-child{border-radius:8px 0 0 8px}
    .miniqty button:last-child{border-radius:0 8px 8px 0}
    .miniqty input{width:46px;height:30px;text-align:center;border:1px solid var(--borde);border-left:none;border-right:none;font-weight:600;outline:none;-moz-appearance:textfield}
    .miniqty input::-webkit-outer-spin-button,.miniqty input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    .item .quitar{background:none;border:none;color:#ef4444;cursor:pointer;font-size:.8rem;margin-top:4px;padding:0}
    .item .sub{font-weight:700;font-size:.92rem;white-space:nowrap}
    #carrito .pie{padding:16px 20px;border-top:1px solid var(--borde)}
    #carrito .total{display:flex;justify-content:space-between;font-size:1.15rem;font-weight:800;margin-bottom:4px}
    #carrito .nota{font-size:.75rem;color:var(--suave);margin-bottom:12px}
    #enviarWa{
      width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
      background:var(--verde);color:#fff;border:none;
      padding:14px;border-radius:12px;font-weight:700;font-size:1rem;cursor:pointer;
    }
    #enviarWa:hover{background:var(--verde-osc)}
    #terminar{
      width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
      background:var(--acento);color:#fff;border:none;margin-top:8px;
      padding:14px;border-radius:12px;font-weight:700;font-size:1rem;cursor:pointer;
    }
    #terminar:hover{background:var(--acento-osc)}
    #vaciar{width:100%;background:none;border:none;color:var(--suave);margin-top:8px;cursor:pointer;font-size:.85rem;padding:6px}
    .carritoVacio{text-align:center;color:var(--suave);padding:50px 20px}

    /* ---------- Cotización ---------- */
    .btn-cotiza{
      padding:11px 16px;border-radius:999px;border:2px solid var(--acento);
      background:#fff;color:var(--acento);font-weight:700;font-size:.9rem;
      cursor:pointer;white-space:nowrap;
    }
    .btn-cotiza:hover{background:#fff5f5}
    #fondoCotiza{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:none}
    #cotiza{
      position:fixed;top:0;right:0;height:100%;width:100%;max-width:440px;
      background:var(--tarjeta);z-index:60;display:none;flex-direction:column;
      box-shadow:-8px 0 30px rgba(0,0,0,.2);
    }
    #cotiza .cab{padding:18px 20px;border-bottom:1px solid var(--borde);display:flex;align-items:center;justify-content:space-between}
    #cotiza .cab h2{font-size:1.2rem}
    #cerrarCotiza{background:none;border:none;font-size:1.6rem;cursor:pointer;color:var(--suave);line-height:1}
    #cotizaBody{flex:1;overflow-y:auto;padding:14px 16px}
    #cotizaBuscar{width:100%;padding:11px 14px;border:1px solid var(--borde);border-radius:10px;font-size:1rem;outline:none}
    #cotizaBuscar:focus{border-color:var(--acento)}
    .cot-res{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 4px;border-bottom:1px solid var(--borde)}
    .cot-res .mini{font-size:.78rem;color:var(--suave)}
    .cot-add{width:34px;height:34px;flex:none;border:1px solid var(--acento);background:#fff;color:var(--acento);border-radius:8px;font-size:1.2rem;cursor:pointer}
    .cotiza-especial{margin-top:14px;background:#f9fafb;border:1px solid var(--borde);border-radius:12px;padding:12px}
    .cotiza-especial .lbl{font-size:.85rem;color:var(--suave);margin-bottom:6px;font-weight:600}
    .cotiza-especial #espDesc{width:100%;padding:10px 12px;border:1px solid var(--borde);border-radius:8px;font-size:.95rem;outline:none}
    .cotiza-especial .fila{display:flex;gap:8px;margin-top:8px}
    .cotiza-especial #espCant{width:80px;padding:10px;border:1px solid var(--borde);border-radius:8px;text-align:center;font-weight:600;-moz-appearance:textfield}
    .cotiza-especial #espAgregar{flex:1;background:var(--acento);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer}
    #cotizaLista{margin-top:14px}
    .cot-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--borde)}
    .cot-item .d{flex:1;min-width:0}
    .cot-item .dn{font-weight:600;font-size:.92rem}
    .cot-item .dc{font-size:.78rem;color:var(--suave)}
    .cot-item .df{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
    .cot-item .sub{font-weight:700;font-size:.9rem;white-space:nowrap}
    .cot-item .porcot{font-size:.78rem;color:#b45309;font-weight:700}
    .cot-item .quitar{background:none;border:none;color:#ef4444;cursor:pointer;font-size:.78rem;padding:0;margin-top:4px}
    #cotizaNombre{width:100%;margin-top:14px;padding:11px 14px;border:1px solid var(--borde);border-radius:10px;font-size:1rem;outline:none}
    #cotiza .pie{padding:16px 20px;border-top:1px solid var(--borde)}
    #enviarCotiza{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--verde);color:#fff;border:none;padding:14px;border-radius:12px;font-weight:700;font-size:1rem;cursor:pointer}
    #enviarCotiza:hover{background:var(--verde-osc)}
    #descargarCotiza{width:100%;margin-top:8px;background:#fff;color:var(--acento);border:2px solid var(--acento);padding:12px;border-radius:12px;font-weight:700;font-size:1rem;cursor:pointer}
    #descargarCotiza:hover{background:#fff5f5}
    #terminarCotiza{width:100%;margin-top:8px;background:var(--verde);color:#fff;border:none;padding:13px;border-radius:12px;font-weight:700;font-size:1rem;cursor:pointer}
    #terminarCotiza:hover{background:var(--verde-osc)}
    .cotizaVacio{text-align:center;color:var(--suave);padding:20px}

    /* ---------- En CELULAR: vista tipo lista (foto chica a la izquierda) ---------- */
    @media (max-width: 600px){
      header .logo{width:65%;max-width:240px;height:auto}
      header.compacto .logo{width:auto;max-width:150px;height:32px}
      .barra{top:51px;gap:8px}
      /* Familias en UNA sola fila que se desliza de lado */
      .filtros{
        flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;
        width:100%;padding-bottom:2px;-webkit-overflow-scrolling:touch;
      }
      .filtros::-webkit-scrollbar{display:none}
      .filtros{scrollbar-width:none}
      .chip{flex:0 0 auto}
      .hint-fam{
        display:block;width:100%;text-align:center;
        font-size:.82rem;color:var(--acento);font-weight:600;margin-top:2px;
      }
      .hint-fam span{display:inline-block;animation:desliza 1.1s ease-in-out infinite}
      .grid{grid-template-columns:1fr;gap:10px;padding:12px}
      .card{flex-direction:row;align-items:flex-start}
      .card:hover{transform:none;box-shadow:0 1px 3px rgba(0,0,0,.06)}
      .foto{width:110px;flex:none;aspect-ratio:1/1;padding:6px;border-right:1px solid var(--borde)}
      .info{padding:10px 12px}
      .cat{font-size:.64rem}
      .chip{padding:6px 11px;font-size:.72rem}
      .nombre{font-size:.92rem;margin:2px 0;flex:none}
      .codigo{font-size:.72rem}
      .precio{font-size:1.15rem;margin-top:6px}
      .precio .base{font-size:.78rem}
      .qty{margin-top:8px;max-width:220px}
      .qty button{width:36px;height:38px;font-size:1.15rem}
      .qty input{height:38px}
      .btn-add{margin-top:8px;padding:10px;font-size:.9rem;max-width:260px}
    }
  </style>
</head>
<body>

  <header>
    <img id="logo" class="logo" src="logo.png" alt="Logo">
  </header>
  <div id="spacer"></div>

  <div class="clientebar">
    👤 <label for="cliente">¿Cliente de mayoreo?</label>
    <input id="cliente" type="text" inputmode="text" placeholder="N° de cliente" autocomplete="off">
    <span id="clienteMsg"></span>
  </div>

  <div class="barra">
    <input id="buscar" type="search" placeholder="🔍 Buscar por descripción o código...">
    <button id="btnCotiza" class="btn-cotiza" type="button">🧾 Cotización</button>
    <div class="filtros" id="filtros"></div>
    <div class="hint-fam"><span>→</span> desliza para más categorías <span>→</span></div>
  </div>

  <div class="grid" id="grid"></div>

  <footer id="pie"></footer>

  <!-- Botón flotante del carrito -->
  <button id="verPedido"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg> Ver pedido <span class="globo" id="contador">0</span></button>

  <!-- Panel del carrito -->
  <div id="fondoCarrito"></div>
  <aside id="carrito">
    <div class="cab">
      <h2>Tu pedido</h2>
      <button id="cerrar">&times;</button>
    </div>
    <div id="items"></div>
    <div class="pie" id="pieCarrito"></div>
  </aside>

  <!-- Ventana de Cotización -->
  <div id="fondoCotiza"></div>
  <aside id="cotiza">
    <div class="cab">
      <h2>🧾 Cotización</h2>
      <button id="cerrarCotiza">&times;</button>
    </div>
    <div id="cotizaBody">
      <input id="cotizaBuscar" type="search" placeholder="🔍 Buscar producto de la lista...">
      <div id="cotizaResultados"></div>
      <div class="cotiza-especial">
        <div class="lbl">¿No lo encuentras? Escríbelo y lo cotizamos:</div>
        <input id="espDesc" type="text" placeholder="Qué necesitas (ej. 5 cajas de aceite)">
        <div class="fila">
          <input id="espCant" type="number" value="1" min="0" step="1" inputmode="decimal">
          <button id="espAgregar" type="button">Agregar</button>
        </div>
      </div>
      <div id="cotizaLista"></div>
      <input id="cotizaNombre" type="text" placeholder="Tu nombre (opcional)">
    </div>
    <div class="pie" id="cotizaPie"></div>
  </aside>

  <script src="productos.js?v=961db91a"></script>
  <script>
    // --- Rellenar textos de la tienda ---
    document.getElementById('logo').alt = CONFIG.nombreTienda;
    document.title = CONFIG.nombreTienda + " · Catálogo";
    document.getElementById('pie').innerHTML = CONFIG.nombreTienda + '<div class="powered">Powered by Eduardo</div>';

    let categoriaActual = "Todos";
    let textoBusqueda = "";

    // El carrito se guarda en el navegador para no perderlo al recargar
    const LLAVE = "carrito_" + CONFIG.nombreTienda;
    let carrito = [];
    try { carrito = JSON.parse(localStorage.getItem(LLAVE)) || []; } catch(e){ carrito = []; }

    function guardarCarrito(){
      try { localStorage.setItem(LLAVE, JSON.stringify(carrito)); } catch(e){}
    }

    // --- Precios por cliente (una hoja = un cliente) ---
    const PRECIOS = (typeof PRECIOS_CLIENTE !== 'undefined') ? PRECIOS_CLIENTE : {};

    // Normaliza un código: si es solo números, le quita los ceros de adelante
    // (así 00118, 0118 y 118 se consideran el mismo). Si no, minúsculas.
    function normCod(s){
      s = String(s == null ? "" : s).trim();
      if(/^\d+$/.test(s)) return s.replace(/^0+/, "") || "0";
      return s.toLowerCase();
    }

    // Índice tolerante: cliente (mayús/espacios) y código (ceros de adelante)
    const PRECIOS_NORM = {};
    Object.keys(PRECIOS).forEach(k => {
      const dst = {};
      const src = PRECIOS[k];
      Object.keys(src).forEach(cod => { dst[normCod(cod)] = src[cod]; });
      PRECIOS_NORM[k.trim().toLowerCase()] = dst;
    });

    // Clientes con % de descuento (aplica a todos los productos)
    const DESC = (typeof DESCUENTOS !== 'undefined') ? DESCUENTOS : {};
    const DESC_NORM = {};
    Object.keys(DESC).forEach(k => { DESC_NORM[k.trim().toLowerCase()] = Number(DESC[k]) || 0; });
    function descuentoCliente(){
      return DESC_NORM[clienteActual.trim().toLowerCase()] || 0;
    }

    // Clientes restringidos: solo ven los códigos listados en la pestaña "Restringidos"
    const REST = (typeof RESTRINGIDOS !== 'undefined') ? RESTRINGIDOS : {};
    const REST_NORM = {};
    Object.keys(REST).forEach(k => {
      REST_NORM[k.trim().toLowerCase()] = new Set((REST[k] || []).map(normCod));
    });
    function clienteRestringido(){
      return REST_NORM.hasOwnProperty(clienteActual.trim().toLowerCase());
    }
    // Códigos que puede ver ese cliente restringido
    function codigosPermitidos(){
      return REST_NORM[clienteActual.trim().toLowerCase()] || new Set();
    }

    const PROD_POR_COD = {};
    PRODUCTOS.forEach(p => { if(p.codigo) PROD_POR_COD[p.codigo] = p; });

    let clienteActual = "";
    try { clienteActual = localStorage.getItem("cliente_" + CONFIG.nombreTienda) || ""; } catch(e){}

    // Lista de precios del cliente activo (o null si no existe)
    function listaCliente(){
      return PRECIOS_NORM[clienteActual.trim().toLowerCase()] || null;
    }
    // Precio que le toca a un producto segun el cliente activo
    function precioDe(p){
      const lista = listaCliente();
      if(lista){
        const v = lista[normCod(p.codigo)];
        if(v != null) return v;
      }
      // Si el cliente tiene % de descuento, se aplica a la lista
      const pct = descuentoCliente();
      if(pct > 0){
        return Math.round(p.precio * (1 - pct / 100) * 100) / 100;
      }
      return p.precio;
    }

    // Precio para cotización: mismo criterio (precio especial o % descuento) sobre un precio base
    function precioClienteDe(codigo, base){
      base = Number(base) || 0;
      const lista = listaCliente();
      if(lista){ const v = lista[normCod(codigo)]; if(v != null) return v; }
      const pct = descuentoCliente();
      if(pct > 0) return Math.round(base * (1 - pct / 100) * 100) / 100;
      return base;
    }

    // --- Inventario en vivo (leido de la Hoja de Google) ---
    let INV_LIVE = null;   // null = todavia no carga; usa el del Excel mientras
    function existenciaDe(p){
      if(INV_LIVE){
        const v = INV_LIVE[normCod(p.codigo)];
        return (v === undefined) ? null : v;   // no está en inventario = sin control
      }
      return (p.existencia === undefined) ? null : p.existencia;  // respaldo (Excel)
    }
    function cargarInventarioLive(){
      if(!CONFIG.pedidosURL) return;
      const cb = 'inv_cb_' + Math.floor(Math.random() * 1e9);
      window[cb] = function(data){
        INV_LIVE = {};
        Object.keys(data || {}).forEach(function(k){ INV_LIVE[normCod(k)] = Number(data[k]); });
        try { delete window[cb]; } catch(e){}
        pintar();   // volver a dibujar ya con el inventario real
      };
      const s = document.createElement('script');
      s.src = CONFIG.pedidosURL + '?callback=' + cb + '&t=' + Date.now();
      s.onerror = function(){ try { delete window[cb]; } catch(e){} };
      document.head.appendChild(s);
    }

    function formatoPrecio(n){
      return CONFIG.moneda + n.toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2});
    }
    function fmtCant(n){
      return (n % 1 === 0) ? n : Number(n.toFixed(2));
    }

    // --- Crear los botones de categoría automáticamente ---
    const categorias = ["Todos", ...new Set(PRODUCTOS.map(p => p.familia))];
    const contFiltros = document.getElementById('filtros');
    categorias.forEach(cat => {
      const b = document.createElement('button');
      b.className = 'chip' + (cat === "Todos" ? ' activo' : '');
      b.textContent = cat;
      b.onclick = () => {
        categoriaActual = cat;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('activo'));
        b.classList.add('activo');
        pintar();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      contFiltros.appendChild(b);
    });

    // --- Buscador ---
    document.getElementById('buscar').addEventListener('input', e => {
      textoBusqueda = e.target.value.toLowerCase();
      pintar();
    });

    // --- Dibujar los productos ---
    function pintar(){
      const grid = document.getElementById('grid');
      grid.innerHTML = "";

      // Si el cliente es restringido, solo mostramos los códigos de su lista
      const restringido = clienteRestringido();
      const permitidos = restringido ? codigosPermitidos() : null;

      const lista = PRODUCTOS.filter(p => {
        if(permitidos && !permitidos.has(normCod(p.codigo))) return false;
        const okCat = categoriaActual === "Todos" || p.familia === categoriaActual;
        const okBusca = p.descripcion.toLowerCase().includes(textoBusqueda)
                     || p.codigo.toLowerCase().includes(textoBusqueda);
        return okCat && okBusca;
      });

      if(lista.length === 0){
        grid.innerHTML = '<div class="vacio">No se encontraron productos 🙁</div>';
        return;
      }

      lista.forEach((p, idx) => {
        const card = document.createElement('div');
        card.className = 'card';

        const foto = p.foto
          ? `<img class="foto" src="imagenes/${p.foto}" alt="${p.descripcion}" onerror="this.outerHTML='<div class=\\'foto sin-foto\\'>📦</div>'">`
          : `<div class="foto sin-foto">📦</div>`;

        const lineaCodigo = p.codigo ? `<div class="codigo">Código: <b>${p.codigo}</b></div>` : "";
        const uPrecio = p.unidad ? ` <span class="u">/ ${p.unidad}</span>` : "";
        const uQty = p.unidad ? `<span class="u">${p.unidad}</span>` : "";

        // Precio segun cliente (si tiene especial, se muestra el de lista tachado)
        const precioFinal = precioDe(p);
        const esEspecial = precioFinal !== p.precio;
        const precioHtml = esEspecial
          ? `${formatoPrecio(precioFinal)}${uPrecio}<span class="base">${formatoPrecio(p.precio)}</span><span class="badge-cli">CLIENTE</span>`
          : `${formatoPrecio(p.precio)}${uPrecio}`;

        // ¿Agotado? Usa el inventario en vivo (Google) si ya cargó; si no, el del Excel.
        // Existencia sin definir = sin control = disponible.
        const exist = existenciaDe(p);
        const agotado = (exist !== null && exist !== undefined && exist <= 0);
        if(agotado) card.className = 'card agotado';

        const cinta = agotado ? `<div class="cinta-agotado">AGOTADO</div>` : "";

        // Mostrar existencia disponible (solo si hay control de inventario y hay stock)
        const existenciaHtml = (!agotado && exist !== null && exist !== undefined && exist > 0)
          ? `<div class="existencia">Disponibles: <b>${fmtCant(exist)}${p.unidad ? ' ' + p.unidad : ''}</b></div>`
          : "";

        const controles = agotado
          ? `<div class="agotado-msg">😔 Agotado por ahora</div>`
          : `
            <div class="qty">
              <button class="menos" type="button">−</button>
              <input class="cant" type="number" value="1" min="0" ${(exist !== null && exist !== undefined) ? `max="${exist}"` : ''} step="1" inputmode="decimal">
              <button class="mas" type="button">+</button>
              ${uQty}
            </div>
            <button class="btn-add" type="button"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg> Agregar</button>`;

        card.innerHTML = `
          ${cinta}
          ${foto}
          <div class="info">
            <span class="cat">${p.familia}</span>
            <div class="nombre">${p.descripcion}</div>
            ${lineaCodigo}
            <div class="precio">${precioHtml}</div>
            ${existenciaHtml}
            ${controles}
          </div>
        `;

        // Guardar los datos del producto en la tarjeta
        card._prod = p;
        grid.appendChild(card);
      });
    }

    // Tope de existencia de un producto (o null si no hay control de inventario)
    function topeDe(p){
      const e = existenciaDe(p);
      return (e === null || e === undefined) ? null : e;
    }
    // Cuánto de ese producto ya está en el carrito
    function enCarritoDe(p){
      const it = carrito.find(i => i.k === (p.codigo || p.descripcion));
      return it ? it.cant : 0;
    }

    // --- Clics en las tarjetas (cantidad y agregar) ---
    document.getElementById('grid').addEventListener('click', e => {
      const card = e.target.closest('.card');
      if(!card) return;
      const input = card.querySelector('.cant');
      const tope = card._prod ? topeDe(card._prod) : null;

      if(e.target.classList.contains('menos')){
        let v = parseFloat(input.value) || 0;
        input.value = fmtCant(Math.max(0, v - 1));
        return;
      }
      if(e.target.classList.contains('mas')){
        let v = parseFloat(input.value) || 0;
        v = v + 1;
        if(tope !== null && v > tope) v = tope;   // no pasar de la existencia
        input.value = fmtCant(v);
        return;
      }
      if(e.target.classList.contains('btn-add')){
        let cant = parseFloat(input.value);
        if(!cant || cant <= 0){
          alert('Pon una cantidad mayor a 0 para agregar.');
          return;
        }

        // No dejar que el total (carrito + esto) pase de la existencia
        if(tope !== null){
          const yaEnCarrito = enCarritoDe(card._prod);
          const espacio = tope - yaEnCarrito;
          if(espacio <= 0){
            alert('Ya tienes en tu pedido todo lo disponible de este producto (' + fmtCant(tope) + ').');
            return;
          }
          if(cant > espacio){
            cant = espacio;
            alert('Solo hay ' + fmtCant(tope) + ' disponibles. Se agregó ' + fmtCant(cant) + '.');
            input.value = fmtCant(cant);
          }
        }

        agregarAlCarrito(card._prod, cant);
        // Confirmación visual breve
        const b = e.target;
        const htmlOriginal = b.innerHTML;
        b.classList.add('ok');
        b.textContent = "✓ Agregado";
        setTimeout(() => { b.classList.remove('ok'); b.innerHTML = htmlOriginal; }, 900);
      }
    });

    // Si escriben a mano más de la existencia en una tarjeta, lo limitamos
    document.getElementById('grid').addEventListener('input', e => {
      if(!e.target.classList.contains('cant')) return;
      const card = e.target.closest('.card');
      const tope = card && card._prod ? topeDe(card._prod) : null;
      if(tope === null) return;
      let v = parseFloat(e.target.value);
      if(!isNaN(v) && v > tope) e.target.value = fmtCant(tope);
    });

    // --- Carrito ---
    function llave(p){ return p.codigo || p.descripcion; }

    function agregarAlCarrito(p, cant){
      const k = llave(p);
      const tope = topeDe(p);
      const existente = carrito.find(i => i.k === k);
      if(existente){
        let nuevo = fmtCant(existente.cant + cant);
        if(tope !== null && nuevo > tope) nuevo = tope;
        existente.cant = nuevo;
      }else{
        let c = fmtCant(cant);
        if(tope !== null && c > tope) c = tope;
        carrito.push({
          k, codigo: p.codigo, desc: p.descripcion,
          precio: precioDe(p), unidad: p.unidad, foto: p.foto,
          cant: c
        });
      }
      guardarCarrito();
      actualizarCarrito();
    }

    function actualizarCarrito(){
      const totalItems = carrito.reduce((s, i) => s + 1, 0);
      const btnVer = document.getElementById('verPedido');
      document.getElementById('contador').textContent = totalItems;
      btnVer.style.display = totalItems > 0 ? 'inline-flex' : 'none';

      const cont = document.getElementById('items');
      const pie = document.getElementById('pieCarrito');

      if(carrito.length === 0){
        cont.innerHTML = '<div class="carritoVacio">Tu pedido está vacío.<br>Agrega productos del catálogo. 🛒</div>';
        pie.innerHTML = '';
        return;
      }

      let total = 0;
      cont.innerHTML = carrito.map((i, idx) => {
        const sub = i.precio * i.cant;
        total += sub;
        const u = i.unidad ? ' ' + i.unidad : '';
        const img = i.foto
          ? `<img src="imagenes/${i.foto}" alt="" onerror="this.outerHTML='<div class=\\'sf\\'>📦</div>'">`
          : `<div class="sf">📦</div>`;
        const cod = i.codigo ? `Cód. ${i.codigo}` : "";
        return `
          <div class="item" data-idx="${idx}">
            ${img}
            <div class="d">
              <div class="dn">${i.desc}</div>
              <div class="dc">${cod}${u ? ' · ' + i.unidad : ''} · ${formatoPrecio(i.precio)}${u ? ' / ' + i.unidad : ''}</div>
              <div class="df">
                <div class="miniqty">
                  <button class="cmenos" type="button">−</button>
                  <input class="ccant" type="number" value="${i.cant}" min="0" step="1" inputmode="decimal">
                  <button class="cmas" type="button">+</button>
                </div>
                <div class="sub">${formatoPrecio(sub)}</div>
              </div>
              <button class="quitar" type="button">Quitar</button>
            </div>
          </div>`;
      }).join('');

      pie.innerHTML = `
        <div class="total"><span>Total aprox.</span><span>${formatoPrecio(total)}</span></div>
        <div class="nota">* El total es aproximado; el precio final puede variar según el peso real.</div>
        <button id="enviarWa" type="button">💬 Enviar pedido por WhatsApp</button>
        <button id="terminar" type="button" style="display:none">✅ Terminar pedido</button>
        <button id="vaciar" type="button">Vaciar pedido</button>
      `;
      document.getElementById('enviarWa').onclick = enviarPedido;
      document.getElementById('terminar').onclick = terminarPedido;
      document.getElementById('vaciar').onclick = () => {
        carrito = []; guardarCarrito(); actualizarCarrito();
      };
    }

    // Terminar: cierra el pedido, refresca el inventario y regresa al inicio
    function terminarPedido(){
      carrito = [];
      guardarCarrito();
      actualizarCarrito();
      cerrarCarrito();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      cargarInventarioLive();   // vuelve a leer las existencias reales de Google
    }

    // Clics dentro del carrito (cantidades y quitar)
    document.getElementById('items').addEventListener('click', e => {
      const fila = e.target.closest('.item');
      if(!fila) return;
      const idx = parseInt(fila.dataset.idx, 10);
      if(e.target.classList.contains('cmenos')){
        carrito[idx].cant = fmtCant(Math.max(0, carrito[idx].cant - 1));
        if(carrito[idx].cant === 0) carrito.splice(idx, 1);
      }else if(e.target.classList.contains('cmas')){
        const pr = PROD_POR_COD[carrito[idx].codigo];
        const tope = pr ? topeDe(pr) : null;
        let v = fmtCant(carrito[idx].cant + 1);
        if(tope !== null && v > tope){
          v = tope;
          alert('Solo hay ' + fmtCant(tope) + ' disponibles de este producto.');
        }
        carrito[idx].cant = v;
      }else if(e.target.classList.contains('quitar')){
        carrito.splice(idx, 1);
      }else{
        return;
      }
      guardarCarrito(); actualizarCarrito();
    });
    // Escribir cantidad a mano dentro del carrito
    document.getElementById('items').addEventListener('change', e => {
      if(!e.target.classList.contains('ccant')) return;
      const fila = e.target.closest('.item');
      const idx = parseInt(fila.dataset.idx, 10);
      let v = parseFloat(e.target.value);
      if(!v || v < 0) v = 0;
      const pr = PROD_POR_COD[carrito[idx].codigo];
      const tope = pr ? topeDe(pr) : null;
      if(tope !== null && v > tope){
        v = tope;
        alert('Solo hay ' + fmtCant(tope) + ' disponibles de este producto.');
      }
      carrito[idx].cant = fmtCant(v);
      if(carrito[idx].cant === 0) carrito.splice(idx, 1);
      guardarCarrito(); actualizarCarrito();
    });

    function enviarPedido(){
      if(carrito.length === 0) return;
      let total = 0;
      const lineas = carrito.map(i => {
        const sub = i.precio * i.cant;
        total += sub;
        const u = i.unidad ? ' ' + i.unidad : '';
        const cod = i.codigo ? ` (Cód. ${i.codigo})` : "";
        return `• ${i.desc}${cod}\n   ${fmtCant(i.cant)}${u} × ${formatoPrecio(i.precio)} = ${formatoPrecio(sub)}`;
      });
      // Bloque de captura: codigo [tab] precio (sin signo $) [tab] cantidad
      const captura = carrito.map(i =>
        `${i.codigo}\t${(i.precio || 0).toFixed(2)}\t${fmtCant(i.cant)}`
      ).join('\n');
      let lineaCliente = "";
      if(clienteActual){
        let tipo = "";
        if(listaCliente()) tipo = " (precio especial)";
        else if(descuentoCliente() > 0) tipo = " (" + descuentoCliente() + "% de descuento)";
        lineaCliente = `Cliente: ${clienteActual}${tipo}\n`;
      }
      const msg = `Hola, quiero hacer este pedido:\n${lineaCliente}\n${lineas.join('\n')}\n\nTotal aprox.: ${formatoPrecio(total)}\n\n----- Captura (codigo  precio  cantidad) -----\n${captura}`;

      // Registrar el pedido en la Hoja de Google (si está configurada)
      if(CONFIG.pedidosURL){
        try{
          fetch(CONFIG.pedidosURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({
              cliente: clienteActual || '',
              items: carrito.map(i => ({
                codigo: i.codigo,
                desc: i.desc,
                cant: fmtCant(i.cant),
                precio: i.precio || 0
              }))
            })
          });
        }catch(err){ /* si falla el registro, el pedido igual se manda por WhatsApp */ }
      }

      // Bajar de inmediato el inventario mostrado (localmente), sin esperar a Google
      if(INV_LIVE){
        carrito.forEach(i => {
          const k = normCod(i.codigo);
          if(INV_LIVE[k] !== undefined) INV_LIVE[k] = INV_LIVE[k] - i.cant;
        });
        pintar();
      }

      window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');

      // Al volver a esta pantalla, mostrar el botón para terminar el pedido
      const btnT = document.getElementById('terminar');
      if(btnT) btnT.style.display = 'flex';
    }

    // Abrir / cerrar el panel
    function abrirCarrito(){
      document.getElementById('fondoCarrito').style.display = 'block';
      document.getElementById('carrito').style.display = 'flex';
    }
    function cerrarCarrito(){
      document.getElementById('fondoCarrito').style.display = 'none';
      document.getElementById('carrito').style.display = 'none';
    }
    document.getElementById('verPedido').onclick = abrirCarrito;
    document.getElementById('cerrar').onclick = cerrarCarrito;
    document.getElementById('fondoCarrito').onclick = cerrarCarrito;

    // --- Campo de número de cliente ---
    const inputCliente = document.getElementById('cliente');
    const clienteMsg = document.getElementById('clienteMsg');
    inputCliente.value = clienteActual;

    function aplicarCliente(){
      clienteActual = inputCliente.value.trim();
      try { localStorage.setItem("cliente_" + CONFIG.nombreTienda, clienteActual); } catch(e){}

      if(!clienteActual){
        clienteMsg.textContent = "";
        clienteMsg.className = "";
      }else if(listaCliente()){
        clienteMsg.textContent = "✓ Precios de mayoreo";
        clienteMsg.className = "ok";
      }else if(descuentoCliente() > 0){
        clienteMsg.textContent = "✓ " + descuentoCliente() + "% de descuento";
        clienteMsg.className = "ok";
      }else{
        clienteMsg.textContent = "Número no reconocido — verás precios de lista";
        clienteMsg.className = "no";
      }

      // Recalcular precios de lo que ya esté en el carrito
      carrito.forEach(i => {
        const p = PROD_POR_COD[i.codigo];
        if(p) i.precio = precioDe(p);
      });
      guardarCarrito();

      pintar();
      actualizarCarrito();
    }
    inputCliente.addEventListener('input', aplicarCliente);

    // Encabezado fijo: el espaciador reserva su lugar para que el contenido NO brinque
    const elHeader = document.querySelector('header');
    const elSpacer = document.getElementById('spacer');
    function ajustarSpacer(){
      const comp = elHeader.classList.contains('compacto');
      elHeader.classList.remove('compacto');
      elSpacer.style.height = elHeader.offsetHeight + 'px';
      if(comp) elHeader.classList.add('compacto');
    }
    window.addEventListener('resize', ajustarSpacer, { passive: true });
    const _logoEl = document.getElementById('logo');
    if(_logoEl) _logoEl.addEventListener('load', ajustarSpacer);
    ajustarSpacer();

    // Al bajar: logo chico y a la izquierda
    window.addEventListener('scroll', () => {
      if(window.scrollY > 20) elHeader.classList.add('compacto');
      else elHeader.classList.remove('compacto');
    }, { passive: true });

    // Tocar el logo = ir a inicio (arriba, "Todos", sin búsqueda)
    document.getElementById('logo').addEventListener('click', () => {
      categoriaActual = "Todos";
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('activo'));
      const chipTodos = [...document.querySelectorAll('.chip')].find(c => c.textContent === "Todos");
      if(chipTodos) chipTodos.classList.add('activo');
      document.getElementById('buscar').value = "";
      textoBusqueda = "";
      const filtros = document.getElementById('filtros');
      if(filtros) filtros.scrollLeft = 0;   // regresar las familias al principio
      pintar();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // App instalable: registrar el service worker
    if('serviceWorker' in navigator){
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    // ================= COTIZACIÓN =================
    const BASE = (typeof BASE_DATOS !== 'undefined') ? BASE_DATOS : [];
    let cotizaItems = [];
    const fondoCotiza = document.getElementById('fondoCotiza');
    const elCotiza = document.getElementById('cotiza');
    const cotizaBuscar = document.getElementById('cotizaBuscar');
    const cotizaResultados = document.getElementById('cotizaResultados');

    document.getElementById('btnCotiza').onclick = () => {
      fondoCotiza.style.display = 'block'; elCotiza.style.display = 'flex';
      renderCotiza();   // refrescar precios según el cliente actual
    };
    function cerrarCotiza(){ fondoCotiza.style.display = 'none'; elCotiza.style.display = 'none'; }
    document.getElementById('cerrarCotiza').onclick = cerrarCotiza;
    fondoCotiza.onclick = cerrarCotiza;

    // Buscar en la base de datos
    cotizaBuscar.addEventListener('input', () => {
      const q = cotizaBuscar.value.trim().toLowerCase();
      if(q.length < 2){ cotizaResultados.innerHTML = ''; cotizaResultados._res = []; return; }
      const res = [];
      for(let i = 0; i < BASE.length && res.length < 25; i++){
        const p = BASE[i];
        if((p.descripcion || '').toLowerCase().includes(q) || String(p.codigo || '').toLowerCase().includes(q)) res.push(p);
      }
      cotizaResultados._res = res;
      cotizaResultados.innerHTML = res.length ? res.map((p, i) => `
        <div class="cot-res">
          <div><div><b>${p.descripcion || ''}</b></div>
          <div class="mini">${p.codigo ? ('Cód. ' + p.codigo + ' · ') : ''}${formatoPrecio(p.precio)}${p.unidad ? (' / ' + p.unidad) : ''}</div></div>
          <button class="cot-add" data-i="${i}" type="button">+</button>
        </div>`).join('')
        : '<div class="mini" style="padding:8px 4px">Sin resultados. Puedes pedirlo abajo como "por cotizar".</div>';
    });
    cotizaResultados.addEventListener('click', e => {
      const b = e.target.closest('.cot-add'); if(!b) return;
      const p = cotizaResultados._res[parseInt(b.dataset.i, 10)];
      if(!p) return;
      cotizaItems.push({ tipo:'lista', codigo:p.codigo, desc:p.descripcion, unidad:p.unidad, precioBase:p.precio || 0, cant:1 });
      cotizaBuscar.value = ''; cotizaResultados.innerHTML = ''; cotizaResultados._res = [];
      renderCotiza();
    });

    // Artículo especial (por cotizar)
    document.getElementById('espAgregar').onclick = () => {
      const d = document.getElementById('espDesc').value.trim();
      let c = parseFloat(document.getElementById('espCant').value); if(!c || c <= 0) c = 1;
      if(!d){ alert('Escribe qué necesitas.'); return; }
      cotizaItems.push({ tipo:'especial', desc:d, cant:fmtCant(c), precio:0 });
      document.getElementById('espDesc').value = ''; document.getElementById('espCant').value = '1';
      renderCotiza();
    };

    function renderCotiza(){
      const cont = document.getElementById('cotizaLista');
      const pie = document.getElementById('cotizaPie');
      if(cotizaItems.length === 0){
        cont.innerHTML = '<div class="cotizaVacio">Aún no agregas nada a la cotización.</div>';
        pie.innerHTML = '';
        return;
      }
      let total = 0;
      cont.innerHTML = cotizaItems.map((i, idx) => {
        const stepper = `
          <div class="miniqty">
            <button class="cmenos" type="button">−</button>
            <input class="ccant" type="number" value="${i.cant}" min="0" step="1" inputmode="decimal">
            <button class="cmas" type="button">+</button>
          </div>`;
        if(i.tipo === 'lista'){
          const precio = precioClienteDe(i.codigo, i.precioBase);
          const sub = precio * i.cant; total += sub;
          const cod = i.codigo ? 'Cód. ' + i.codigo + ' · ' : '';
          const u = i.unidad ? ' / ' + i.unidad : '';
          return `<div class="cot-item" data-idx="${idx}"><div class="d">
            <div class="dn">${i.desc}</div>
            <div class="dc">${cod}${formatoPrecio(precio)}${u}</div>
            <div class="df">${stepper}<div class="sub">${formatoPrecio(sub)}</div></div>
            <button class="quitar" type="button">Quitar</button>
          </div></div>`;
        }
        return `<div class="cot-item" data-idx="${idx}"><div class="d">
          <div class="dn">${i.desc}</div>
          <div class="df">${stepper}<div class="porcot">Por cotizar</div></div>
          <button class="quitar" type="button">Quitar</button>
        </div></div>`;
      }).join('');
      pie.innerHTML = `
        <div style="display:flex;justify-content:space-between;font-weight:800;font-size:1.05rem;margin-bottom:6px"><span>Subtotal (con precio)</span><span>${formatoPrecio(total)}</span></div>
        <div style="font-size:.75rem;color:var(--suave);margin-bottom:10px">Los artículos "por cotizar" se te pasan a mano.</div>
        <button id="descargarCotiza" type="button">📄 Descargar PDF</button>
        <button id="terminarCotiza" type="button">✅ Terminar cotización</button>
      `;
      document.getElementById('descargarCotiza').onclick = descargarPDF;
      document.getElementById('terminarCotiza').onclick = terminarCotiza;
    }

    // Cantidades y quitar dentro de la cotización
    document.getElementById('cotizaLista').addEventListener('click', e => {
      const fila = e.target.closest('.cot-item'); if(!fila) return;
      const idx = parseInt(fila.dataset.idx, 10);
      if(e.target.classList.contains('cmenos')){
        cotizaItems[idx].cant = fmtCant(Math.max(0, cotizaItems[idx].cant - 1));
        if(cotizaItems[idx].cant === 0) cotizaItems.splice(idx, 1);
      }else if(e.target.classList.contains('cmas')){
        cotizaItems[idx].cant = fmtCant(cotizaItems[idx].cant + 1);
      }else if(e.target.classList.contains('quitar')){
        cotizaItems.splice(idx, 1);
      }else return;
      renderCotiza();
    });
    document.getElementById('cotizaLista').addEventListener('change', e => {
      if(!e.target.classList.contains('ccant')) return;
      const fila = e.target.closest('.cot-item');
      const idx = parseInt(fila.dataset.idx, 10);
      let v = parseFloat(e.target.value); if(!v || v < 0) v = 0;
      cotizaItems[idx].cant = fmtCant(v);
      if(cotizaItems[idx].cant === 0) cotizaItems.splice(idx, 1);
      renderCotiza();
    });

    // Guarda la cotización en la Hoja de Google (pestaña Cotizaciones)
    function guardarCotizaEnHoja(){
      if(!CONFIG.pedidosURL || cotizaItems.length === 0) return;
      const nombre = document.getElementById('cotizaNombre').value.trim();
      try{
        fetch(CONFIG.pedidosURL, {
          method:'POST', mode:'no-cors', headers:{ 'Content-Type':'text/plain;charset=utf-8' },
          body: JSON.stringify({
            tipo:'cotizacion', nombre: nombre, cliente: clienteActual || '',
            items: cotizaItems.map(i => ({
              tipo: i.tipo, codigo: i.codigo || '', desc: i.desc, cant: fmtCant(i.cant),
              precio: (i.tipo === 'lista') ? precioClienteDe(i.codigo, i.precioBase) : 0
            }))
          })
        });
      }catch(err){}
    }

    // Terminar cotización: guarda, limpia y regresa al inicio
    function terminarCotiza(){
      if(cotizaItems.length === 0){ cerrarCotiza(); return; }
      guardarCotizaEnHoja();
      cotizaItems = [];
      document.getElementById('cotizaNombre').value = '';
      renderCotiza();
      cerrarCotiza();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Cargar la librería de PDF (jsPDF) solo cuando se necesita
    function cargarScript(src){
      return new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = src; s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    async function asegurarJsPDF(){
      if(window.jspdf && window.jspdf.jsPDF) return;
      await cargarScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
      await cargarScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js');
    }

    // Prepara el logo como imagen para el PDF
    let _logoDataURL = null;
    function obtenerLogoDataURL(){
      return new Promise((res) => {
        if(_logoDataURL !== null) return res(_logoDataURL || null);
        const img = new Image();
        img.onload = () => {
          try{
            const c = document.createElement('canvas');
            c.width = img.naturalWidth; c.height = img.naturalHeight;
            c.getContext('2d').drawImage(img, 0, 0);
            _logoDataURL = c.toDataURL('image/png');
          }catch(e){ _logoDataURL = ''; }
          res(_logoDataURL || null);
        };
        img.onerror = () => { _logoDataURL = ''; res(null); };
        img.src = 'logo.png';
      });
    }

    // Descargar / compartir la cotización como PDF de verdad
    async function descargarPDF(){
      if(cotizaItems.length === 0) return;
      const btn = document.getElementById('descargarCotiza');
      const txtBtn = btn ? btn.textContent : '';
      if(btn){ btn.textContent = 'Generando PDF...'; btn.disabled = true; }
      try{
        await asegurarJsPDF();
      }catch(e){
        alert('No se pudo generar el PDF (revisa tu conexión a internet).');
        if(btn){ btn.textContent = txtBtn; btn.disabled = false; }
        return;
      }

      const nombre = document.getElementById('cotizaNombre').value.trim();
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      let total = 0;
      const body = cotizaItems.map(i => {
        if(i.tipo === 'lista'){
          const precio = precioClienteDe(i.codigo, i.precioBase);
          const sub = precio * i.cant; total += sub;
          return [String(i.codigo || ''), String(i.desc || ''), String(i.unidad || ''), String(fmtCant(i.cant)), formatoPrecio(precio), formatoPrecio(sub)];
        }
        return ['', String(i.desc || ''), '', String(fmtCant(i.cant)), '—', 'Por cotizar'];
      });

      const logoData = await obtenerLogoDataURL();
      let y = 14;
      if(logoData){
        const w = 55, h = w * (323 / 1088);   // proporción del logo horizontal
        doc.addImage(logoData, 'PNG', 14, 10, w, h);
        y = 10 + h + 7;
      }else{
        doc.setTextColor(225, 37, 27); doc.setFontSize(20); doc.setFont(undefined, 'bold');
        doc.text(CONFIG.nombreTienda || 'BETH YOSEF', 14, 18);
        y = 25;
      }
      doc.setTextColor(90, 90, 90); doc.setFontSize(11); doc.setFont(undefined, 'normal');
      let sub = 'COTIZACIÓN';
      if(nombre) sub += ' · ' + nombre;
      if(clienteActual) sub += ' · Cliente ' + clienteActual;
      doc.text(sub, 14, y);

      doc.autoTable({
        startY: y + 5,
        head: [['Código', 'Producto', 'Unidad', 'Cant.', 'Precio', 'Total']],
        body: body,
        foot: [['', '', '', '', 'GRAN TOTAL', formatoPrecio(total)]],
        headStyles: { fillColor: [225, 37, 27], halign: 'left' },
        footStyles: { fillColor: [245, 245, 245], textColor: [20, 20, 20], fontStyle: 'bold', halign: 'right' },
        columnStyles: { 3: { halign: 'right' }, 4: { halign: 'right' }, 5: { halign: 'right' } },
        styles: { fontSize: 9, cellPadding: 2.5 }
      });

      const blob = doc.output('blob');
      const archivo = new File([blob], 'cotizacion.pdf', { type: 'application/pdf' });

      // En celular: abrir menú de Compartir (WhatsApp, guardar, etc.)
      if(navigator.canShare && navigator.canShare({ files: [archivo] })){
        try{ await navigator.share({ files: [archivo], title: 'Cotización' }); }
        catch(e){ /* si cancela, no pasa nada */ }
      }else{
        // Escritorio u otros: descargar
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'cotizacion.pdf';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      }
      if(btn){ btn.textContent = txtBtn; btn.disabled = false; }
    }

    renderCotiza();

    // Arranque
    aplicarCliente();
    cargarInventarioLive();   // lee el inventario de Google y refresca los AGOTADO
  </script>
</body>
</html>
